name: CI

on:
  push:
    branches:
      - master
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep the "modern" leg on PHPUnit 9 until the suite is upgraded for
        # PHPUnit 10+, so CI currently stops at PHP 8.4.
        include:
          - php: '7.1'
            composer: basic
            phpunit: '^7.5'
            phpunit_config: phpunit.legacy.xml.dist
          - php: '7.2'
            composer: basic
            phpunit: '^8.5'
            phpunit_config: phpunit.legacy.xml.dist
          - php: '7.3'
            composer: basic
            phpunit: '^9.6'
            phpunit_config: phpunit.xml.dist
          - php: '7.4'
            composer: basic
            phpunit: '^9.6'
            phpunit_config: phpunit.xml.dist
          - php: '8.0'
            composer: basic
            phpunit: '^9.6'
            phpunit_config: phpunit.xml.dist
          - php: '8.1'
            composer: basic
            phpunit: '^9.6'
            phpunit_config: phpunit.xml.dist
          - php: '8.2'
            composer: basic
            phpunit: '^9.6'
            phpunit_config: phpunit.xml.dist
          - php: '8.3'
            composer: basic
            phpunit: '^9.6'
            phpunit_config: phpunit.xml.dist
          - php: '8.4'
            composer: basic
            phpunit: '^9.6'
            phpunit_config: phpunit.xml.dist
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          extensions: zip
          tools: 'composer'

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "directory=$(composer config cache-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.directory }}
          key: ${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ matrix.php }}-composer-

      - name: Install dependencies
        run: |
          composer require --dev --no-update "phpunit/phpunit:${{ matrix.phpunit }}"

          if [[ "${{ matrix.composer }}" == "lowest" ]]; then
            composer update --prefer-dist --no-interaction --prefer-lowest --prefer-stable
          fi;

          if [[ "${{ matrix.composer }}" == "basic" ]]; then
            composer update --prefer-dist --no-interaction
          fi;

          composer dump-autoload -o

      - name: Run tests
        run: |
          mkdir -p build/logs
          XDEBUG_MODE=coverage php vendor/bin/phpunit -c "${{ matrix.phpunit_config }}"

      - name: Run phpstan
        continue-on-error: true
        if: ${{ matrix.php == '8.1' }}
        run: |
          php vendor/bin/phpstan analyse

      - name: Upload coverage results to Coveralls
        if: ${{ matrix.php == '8.3' }}
        continue-on-error: true
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          composer global require php-coveralls/php-coveralls
          php-coveralls --coverage_clover=build/logs/clover.xml -v

      - name: Upload coverage results to Codecov
        if: ${{ matrix.php == '8.3' }}
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: build/logs/clover.xml

      - name: Upload coverage results to Scrutinizer
        if: ${{ matrix.php == '8.3' }}
        continue-on-error: true
        uses: sudo-bot/action-scrutinizer@latest
        with:
          cli-args: "--format=php-clover build/logs/clover.xml"

      - name: Archive logs artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: logs_composer-${{ matrix.composer }}_php-${{ matrix.php }}
          path: |
            build/logs
